<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambil Foto - Deteksi Pisang</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ── Page-specific styles ── */
        body {
            background: #000;
            padding: 0;
            margin: 0;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0,0,0,0.9);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            border-bottom: 1px solid rgba(253,180,98,0.2);
        }

        h1 {
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .spacer { width: 44px; }

        .camera-section {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video { width: 100%; height: 100%; object-fit: cover; }

        .camera-placeholder { text-align: center; color: white; display: none; }
        .camera-placeholder.show { display: block; }
        .placeholder-icon { font-size: 80px; margin-bottom: 20px; }
        .placeholder-text { font-size: 1.1em; margin-bottom: 10px; }
        .placeholder-hint { font-size: 0.9em; color: #aaa; }

        .focus-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 280px; height: 280px;
            border: 3px dashed var(--primary);
            border-radius: 12px;
            pointer-events: none;
            opacity: 0.5;
            animation: focusPulse 2s ease-in-out infinite;
            z-index: 2;
        }

        .controls {
            background: rgba(0,0,0,0.95);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            z-index: 10;
            border-top: 1px solid rgba(253,180,98,0.2);
        }

        #canvas { display: none; }

        /* ── Result Modal ── */
        .result-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 20;
            overflow-y: auto;
            padding: 20px;
            justify-content: center;
            align-items: center;
        }

        .result-modal.show {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .result-card {
            background: white;
            border-radius: 18px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result-image { width: 100%; height: 300px; object-fit: cover; }

        .result-content { padding: 32px; }

        .result-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* ── Loading overlay ── */
        .loading {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 15;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading.show { display: flex; }
        .loading-text { color: white; font-size: 1.1em; font-weight: 500; }

        @media (max-width: 480px) {
            h1 { font-size: 1em; }
            .controls { padding: 15px 10px; gap: 8px; }
            .btn { padding: 12px 20px; font-size: 0.85em; }
            .result-card { max-height: 95vh; border-radius: 16px; }
            .result-content { padding: 24px; }
            .info-grid { grid-template-columns: 1fr; }
            .focus-ring { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="back-btn">←</a>
            <h1>Ambil Foto Pisang</h1>
            <div class="spacer"></div>
        </header>

        <div class="camera-section">
            <video id="video" autoplay playsinline muted></video>
            <div class="focus-ring"></div>
            <div class="camera-placeholder" id="cameraPlaceholder">
                <div class="placeholder-icon">📷</div>
                <div class="placeholder-text">Kamera tidak tersedia</div>
                <div class="placeholder-hint">Izinkan akses kamera di pengaturan perangkat</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="captureBtn">📸 Ambil Foto</button>
            <button class="btn btn-secondary" id="switchBtn">🔄 Ganti Kamera</button>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Menganalisis foto...</div>
    </div>

    <!-- Result Modal -->
    <div class="result-modal" id="resultModal">
        <div class="result-card">
            <img id="resultImage" class="result-image" src="" alt="Hasil Foto">
            <div class="result-content">
                <div class="status-badge" id="statusBadge">
                    <div class="status-icon" id="statusIcon">🍌</div>
                    <div class="status-content">
                        <div class="status-label" id="statusLabel">-</div>
                        <div class="status-desc" id="statusDesc">-</div>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Status</div>
                        <div class="info-value" id="infoStatus">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Rekomendasi</div>
                        <div class="info-value" id="infoRecommend">-</div>
                    </div>
                </div>

                <div class="tips" id="tipsSection">
                    <strong>💡 Tips:</strong>
                    <div id="tipsText"></div>
                </div>

                <div class="result-buttons">
                    <button class="btn btn-primary" id="retryBtn">Ambil Lagi</button>
                    <a href="/" class="btn btn-muted">Kembali</a>
                </div>
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script src="/static/js/banana.js"></script>
    <script src="/static/js/capture.js"></script>
</body>
</html>
