<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Gambar - Deteksi Pisang</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ── Page-specific styles ── */
        body {
            background: linear-gradient(135deg, var(--light) 0%, #FFF8F0 100%);
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-out;
        }

        header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
        }

        /* Override back-btn to match upload page style */
        .back-btn {
            width: 48px;
            height: 48px;
            background: white;
            border: 2px solid var(--primary);
            font-size: 24px;
        }

        .back-btn:hover {
            background: var(--primary);
            transform: translateX(-4px);
            color: var(--dark);
        }

        h1 {
            font-size: 2.2em;
            color: var(--primary-dark);
            font-weight: 700;
        }

        .upload-area {
            background: white;
            border: 2.5px dashed var(--primary);
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: var(--primary-dark);
            background: rgba(253,180,98,0.05);
        }

        .upload-area.dragover {
            border-color: var(--primary-dark);
            background: rgba(253,180,98,0.1);
            transform: scale(1.02);
        }

        .upload-icon { font-size: 64px; margin-bottom: 16px; display: inline-block; }
        .upload-text { font-size: 1.25em; color: var(--primary-dark); font-weight: 600; margin-bottom: 8px; }
        .upload-hint { font-size: 0.95em; color: #999; margin-bottom: 24px; }

        input[type="file"] { display: none; }

        .upload-btn {
            background: linear-gradient(135deg, var(--primary) 0%, #FFC565 100%);
            color: var(--dark);
            border: none;
            padding: 14px 36px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(253,180,98,0.3);
        }

        .upload-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(253,180,98,0.4);
        }

        .preview-container {
            display: none;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .preview-container.show { display: block; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .preview-image { width: 100%; max-height: 400px; object-fit: cover; display: block; }

        .result-container {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result-container.show { display: block; }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show { display: block; }
        .loading .spinner { margin: 0 auto 16px; }
        .loading-text { color: var(--primary-dark); font-weight: 500; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            .upload-area { padding: 40px 20px; }
            .result-container { padding: 24px; }
            .info-grid { grid-template-columns: 1fr; }
            .action-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="back-btn">←</a>
            <h1>Upload Gambar</h1>
        </header>

        <div class="error" id="errorMsg"></div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <div class="upload-text">Pilih atau Tarik Gambar</div>
            <div class="upload-hint">PNG, JPG, JPEG (Max. 5MB)</div>
            <button class="upload-btn" id="uploadBtn">Pilih Gambar</button>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Menganalisis gambar...</div>
        </div>

        <div class="preview-container" id="previewContainer">
            <img id="previewImage" class="preview-image" src="" alt="Preview">
        </div>

        <div class="result-container" id="resultContainer">
            <div class="status-badge" id="statusBadge">
                <div class="status-icon" id="statusIcon">🍌</div>
                <div class="status-content">
                    <div class="status-label" id="statusLabel">-</div>
                    <div class="status-desc" id="statusDesc">-</div>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Status</div>
                    <div class="info-value" id="infoStatus">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Rekomendasi</div>
                    <div class="info-value" id="infoRecommend">-</div>
                </div>
            </div>

            <div class="tips">
                <strong>💡 Tips:</strong>
                <div id="tipsText"></div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="uploadAgainBtn">Upload Lagi</button>
                <a href="/" class="btn btn-muted">Kembali</a>
            </div>
        </div>
    </div>

    <script src="/static/js/banana.js"></script>
    <script src="/static/js/upload.js"></script>
</body>
</html>
